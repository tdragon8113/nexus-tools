server:
  port: 8080

spring:
  application:
    name: nexus-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  config:
    import: optional:nacos:nexus-gateway-${spring.profiles.active:prod}.yml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:}
      discovery:
        enabled: true
      config:
        enabled: true
    gateway:
      routes:
        - id: user-service
          uri: lb://nexus-user-service
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**
          filters:
            - StripPrefix=2
        - id: workspace-service
          uri: lb://nexus-workspace-service
          predicates:
            - Path=/api/v1/workspace/**,/api/v1/todos/**,/api/v1/time-tracks/**
          filters:
            - StripPrefix=2
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

logging:
  level:
    com.nexus.gateway: INFO