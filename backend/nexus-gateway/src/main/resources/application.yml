server:
  port: 8080

# CI 与运维健康检查：deploy.yml 使用 curl http://localhost:8080/actuator/health
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true

spring:
  main:
    web-application-type: reactive
  application:
    name: nexus-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  security:
    user:
      name: disabled
      password: disabled
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
  config:
    import: optional:nacos:nexus-gateway-${spring.profiles.active:prod}.yml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:}
      discovery:
        enabled: true
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        enabled: true
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://nexus-user-service
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**
        - id: workspace-service
          uri: lb://nexus-workspace-service
          predicates:
            - Path=/api/v1/workspace/**,/api/v1/todos/**,/api/v1/habits/**,/api/v1/activities/**,/api/v1/time-tracks/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

logging:
  level:
    com.nexus.gateway: INFO