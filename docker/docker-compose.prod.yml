services:
  nexus-frontend:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/nexus-frontend:${IMAGE_TAG}
    container_name: nexus-frontend
    ports:
      - "8888:80"
    networks:
      - nexus-network
    depends_on:
      - nexus-gateway
    restart: unless-stopped

  nexus-gateway:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/nexus-gateway:${IMAGE_TAG}
    container_name: nexus-gateway
    ports:
      - "8080:8080"
    environment:
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR}
      - NACOS_USERNAME=${NACOS_USERNAME}
      - NACOS_PASSWORD=${NACOS_PASSWORD}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
    networks:
      - nexus-network
    depends_on:
      - nexus-user-service
      - nexus-workspace-service
    restart: unless-stopped

  nexus-user-service:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/nexus-user-service:${IMAGE_TAG}
    container_name: nexus-user-service
    ports:
      - "8081:8081"
    environment:
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR}
      - NACOS_USERNAME=${NACOS_USERNAME}
      - NACOS_PASSWORD=${NACOS_PASSWORD}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
    networks:
      - nexus-network
    restart: unless-stopped

  nexus-workspace-service:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/nexus-workspace-service:${IMAGE_TAG}
    container_name: nexus-workspace-service
    ports:
      - "8082:8082"
    environment:
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR}
      - NACOS_USERNAME=${NACOS_USERNAME}
      - NACOS_PASSWORD=${NACOS_PASSWORD}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
    networks:
      - nexus-network
    restart: unless-stopped

networks:
  nexus-network:
    driver: bridge