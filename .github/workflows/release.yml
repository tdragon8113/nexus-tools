name: Build and Release Mac App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          BUILD_NUMBER=$(echo $VERSION | awk -F. '{print $3}')

          echo "Version: $VERSION, Build: $BUILD_NUMBER"

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" mac-app/NexusTools/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" mac-app/NexusTools/Info.plist

      - name: Build
        run: |
          xcodebuild -project mac-app/NexusTools.xcodeproj \
            -scheme NexusTools \
            -configuration Release \
            -derivedDataPath build \
            clean build

      - name: Sign app (ad-hoc)
        run: |
          codesign --force --deep --sign - build/Build/Products/Release/NexusTools.app

      - name: Create DMG
        run: |
          mkdir -p release
          cp -r build/Build/Products/Release/NexusTools.app release/
          hdiutil create -volname "NexusTools" \
            -srcfolder release/NexusTools.app \
            -ov -format UDZO \
            release/NexusTools.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexusTools
          path: release/NexusTools.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: NexusTools
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/NexusTools.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download v${{ steps.version.outputs.version }} --pattern "NexusTools.dmg"

      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(sha256sum NexusTools.dmg | cut -d' ' -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Update Homebrew Tap
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=${{ steps.sha.outputs.sha }}

          git clone https://x-access-token:${{ secrets.TAP_TOKEN }}@github.com/tdragon8113/homebrew-tap.git
          cd homebrew-tap

          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/nexus-tools.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA\"/" Casks/nexus-tools.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update nexus-tools to v$VERSION"
          git push